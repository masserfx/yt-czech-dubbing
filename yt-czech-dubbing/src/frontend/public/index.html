<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Český Dabing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    .header {
      padding: 16px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header .flag { font-size: 24px; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .input-section {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-section input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .input-section input:focus {
      border-color: #3ea6ff;
    }

    .input-section input::placeholder {
      color: #666;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #3ea6ff;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { background: #65b8ff; }
    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .player-section {
      display: none;
      margin-bottom: 24px;
    }

    .player-section.active { display: block; }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 14px;
      color: #aaa;
    }

    .controls input[type="range"] {
      width: 100px;
    }

    .status-bar {
      display: none;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status-bar.active { display: flex; align-items: center; gap: 12px; }
    .status-bar.processing { background: #1a3a5c; border: 1px solid #3ea6ff; }
    .status-bar.error { background: #3c1a1a; border: 1px solid #ff4444; }
    .status-bar.done { background: #1a3c1a; border: 1px solid #44ff44; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #3ea6ff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #3ea6ff;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .subtitle-overlay {
      text-align: center;
      padding: 8px 16px;
      font-size: 18px;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      min-height: 40px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      margin-top: 8px;
    }

    .subtitle-overlay .original {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    .info {
      margin-top: 40px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    .info h3 { color: #ccc; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="flag">&#127464;&#127487;</span>
    <h1>YouTube - Cesky Dabing</h1>
  </div>

  <div class="container">
    <div class="input-section">
      <input type="text" id="urlInput" placeholder="Vloz YouTube URL (napr. https://youtube.com/watch?v=...)">
      <button class="btn" id="dubBtn" onclick="startDubbing()">Dabovat</button>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="spinner" id="statusSpinner"></div>
      <div>
        <div id="statusText">Zpracovavam...</div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      </div>
    </div>

    <div class="player-section" id="playerSection">
      <div class="video-wrapper">
        <div id="ytPlayer"></div>
      </div>
      <div class="subtitle-overlay" id="subtitleOverlay">
        <div id="subtitleText"></div>
        <div class="original" id="subtitleOriginal"></div>
      </div>
      <div class="controls">
        <button class="btn" id="playPauseBtn" onclick="togglePlayPause()">Play</button>
        <label>Hlasitost dabingu:
          <input type="range" id="dubVolume" min="0" max="100" value="80" oninput="updateDubVolume(this.value)">
        </label>
        <label>Hlasitost originálu:
          <input type="range" id="origVolume" min="0" max="100" value="20" oninput="updateOrigVolume(this.value)">
        </label>
      </div>
    </div>

    <div class="info">
      <h3>Jak to funguje?</h3>
      <p>1. Vlozte YouTube URL a kliknete "Dabovat"<br>
         2. Server stahne titulky, prelozi je do cestiny a vygeneruje cesky hlas<br>
         3. Video se spusti s ceskym dabingem - puvodni zvuk je ztiseny</p>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
