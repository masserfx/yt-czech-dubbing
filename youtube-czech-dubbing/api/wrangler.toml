name = "voicedub-api"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "staging"

# Secrets (wrangler secret put <NAME>):
#   GEMINI_API_KEY        — Gemini překlad (aistudio.google.com)
#   DEEPL_API_KEY         — DeepL fallback (free tier: suffix :fx)
#   OPENAI_API_KEY        — OpenAI fallback (GPT-4o-mini)
#   AZURE_SPEECH_KEY      — Azure Neural TTS
#   AZURE_SPEECH_REGION   — např. "westeurope"
#   API_SIGNING_SECRET    — pro HMAC API klíče

[[kv_namespaces]]
binding = "API_KEYS"
id = "9907b4db08c44155bd7053d5fa0a7a7d"

[[d1_databases]]
binding = "JOBS_DB"
database_name = "voicedub-jobs"
database_id = "a5c8601d-e451-437b-ae7a-9d39a703c076"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIO_STORE"
bucket_name = "voicedub-audio"

[observability]
enabled = true
