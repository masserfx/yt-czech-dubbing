<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
  // Offscreen document: handles SpeechRecognition + mic access.
  // Extension pages (side panel, popup) can't use SpeechRecognition
  // because they run on chrome-extension:// origin.
  // Offscreen documents with USER_MEDIA reason have full Web API access.

  let recognition = null;
  let micStream = null;

  chrome.runtime.onMessage.addListener((msg, sender, sendResponse) => {

    // ── Mic permission request ──
    if (msg.type === 'offscreen-request-mic') {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          micStream = stream; // keep alive
          sendResponse({ granted: true });
        })
        .catch(err => sendResponse({ granted: false, error: err.message }));
      return true;
    }

    // ── Start speech recognition ──
    if (msg.type === 'offscreen-start-recognition') {
      startRecognition(msg.lang || 'cs-CZ');
      sendResponse({ ok: true });
      return false;
    }

    // ── Stop speech recognition ──
    if (msg.type === 'offscreen-stop-recognition') {
      stopRecognition();
      sendResponse({ ok: true });
      return false;
    }
  });

  function startRecognition(lang) {
    stopRecognition(); // clean up any previous

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      chrome.runtime.sendMessage({ type: 'voice-error', error: 'SpeechRecognition not available' });
      return;
    }

    // Ensure mic is active
    if (!micStream || !micStream.active) {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          micStream = stream;
          doStart(SR, lang);
        })
        .catch(err => {
          chrome.runtime.sendMessage({ type: 'voice-error', error: err.message });
        });
    } else {
      doStart(SR, lang);
    }
  }

  function doStart(SR, lang) {
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = lang;

    recognition.onresult = (event) => {
      let interim = '';
      let final = '';
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          final += t;
        } else {
          interim += t;
        }
      }
      chrome.runtime.sendMessage({ type: 'voice-result', final, interim });
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      chrome.runtime.sendMessage({ type: 'voice-error', error: e.error });
    };

    recognition.onend = () => {
      // Notify side panel that recognition ended (may restart if still held)
      chrome.runtime.sendMessage({ type: 'voice-ended' });
    };

    try {
      recognition.start();
      chrome.runtime.sendMessage({ type: 'voice-started' });
    } catch (e) {
      chrome.runtime.sendMessage({ type: 'voice-error', error: e.message });
    }
  }

  function stopRecognition() {
    if (recognition) {
      try { recognition.abort(); } catch (e) {}
      recognition = null;
    }
  }
</script>
</body>
</html>
